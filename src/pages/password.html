<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - SQL Script Generator</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/password.css">
</head>
<body>
    <div class="password-container">
        <div class="password-content">
            <!-- 生成的密码显示 -->
            <div class="password-display-section">
                <div class="password-output-wrapper">
                    <input type="text" id="generatedPassword" class="password-output" readonly placeholder="点击生成按钮创建密码">
                    <button id="toggleVisibilityBtn" class="btn-icon" title="显示/隐藏">👁️</button>
                    <button id="copyPasswordBtn" class="btn-icon" title="复制密码">📋</button>
                </div>
                <button id="generatePasswordBtn" class="btn btn-primary btn-lg generate-btn">
                    🔄 生成密码
                </button>
            </div>

            <!-- 密码长度滑块 -->
            <div class="section">
                <div class="length-header">
                    <label>密码长度</label>
                    <span id="passwordLengthValue" class="length-value">18</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="passwordLength" class="password-slider" min="1" max="100" value="18">
                    <div class="slider-labels">
                        <span>1</span>
                        <span>25</span>
                        <span>50</span>
                        <span>75</span>
                        <span>100</span>
                    </div>
                </div>
            </div>

            <!-- 字符类型选择 -->
            <div class="section">
                <label class="section-title">字符类型</label>
                <div class="checkbox-group">
                    <label class="checkbox-card active" data-type="uppercase">
                        <input type="checkbox" id="includeUppercase" checked hidden>
                        <span class="checkbox-icon">🔠</span>
                        <span class="checkbox-label">大写字母</span>
                        <span class="checkbox-desc">A-Z</span>
                    </label>
                    <label class="checkbox-card active" data-type="lowercase">
                        <input type="checkbox" id="includeLowercase" checked hidden>
                        <span class="checkbox-icon">🔡</span>
                        <span class="checkbox-label">小写字母</span>
                        <span class="checkbox-desc">a-z</span>
                    </label>
                    <label class="checkbox-card active" data-type="numbers">
                        <input type="checkbox" id="includeNumbers" checked hidden>
                        <span class="checkbox-icon">🔢</span>
                        <span class="checkbox-label">数字</span>
                        <span class="checkbox-desc">0-9</span>
                    </label>
                    <label class="checkbox-card" data-type="special">
                        <input type="checkbox" id="includeSpecial" hidden>
                        <span class="checkbox-icon">⚡</span>
                        <span class="checkbox-label">特殊字符</span>
                        <span class="checkbox-desc">!@#$%</span>
                    </label>
                </div>
            </div>

            <!-- 密码强度显示 -->
            <div class="section">
                <div class="strength-header">
                    <label>密码强度</label>
                    <span class="strength-text" id="strengthText">请选择字符类型</span>
                </div>
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>
                <div class="strength-hint" id="strengthHint">
                    建议同时使用大小写字母、数字和特殊字符
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="section history-section">
                <div class="history-header">
                    <label class="section-title">历史记录</label>
                    <button id="clearHistoryBtn" class="btn-text">清空</button>
                </div>
                <div class="history-list" id="historyList">
                    <!-- 历史记录项将在这里生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 复制成功提示 -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">已复制到剪贴板</span>
    </div>

    <script src="../renderer/logger.js"></script>
    <script src="../renderer/password.js"></script>
</body>
</html>
