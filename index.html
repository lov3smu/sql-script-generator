<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Script Generator Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 SQL Script Generator Tool</h1>
            <div class="subtitle">SQL脚本生成工具</div>
        </header>

        <div class="main-content">
            <!-- 操作类型 -->
            <div class="section">
                <label class="section-label">操作类型</label>
                <div class="button-group">
                    <button class="type-btn" data-type="FIX">🔧 FIX</button>
                    <button class="type-btn active" data-type="PUBLISH">📦 PUBLISH</button>
                    <button class="type-btn" data-type="QUERY">🔍 QUERY</button>
                </div>
            </div>

            <!-- 脚本用途 -->
            <div class="section">
                <label class="section-label">脚本用途</label>
                <input type="text" id="usage" placeholder="请输入脚本用途" class="input-field">
            </div>

            <!-- 数据库 -->
            <div class="section">
                <label class="section-label">数据库</label>
                <select id="database" class="select-field">
                    <option value="">请选择数据库</option>
                </select>
            </div>

            <!-- 脚本类型（QUERY时隐藏） -->
            <div class="section" id="scriptTypeSection">
                <label class="section-label">脚本类型</label>
                <select id="scriptType" class="select-field">
                    <option value="">请选择脚本类型</option>
                </select>
            </div>

            <!-- 目录名 -->
            <div class="section">
                <label class="section-label">目录名</label>
                <input type="text" id="dirName" placeholder="目录名（留空自动生成）" class="input-field">
            </div>

            <!-- 按钮 -->
            <div class="action-buttons">
                <button id="generateBtn" class="btn btn-primary">🚀 生成脚本</button>
                <button id="settingsBtn" class="btn btn-secondary">⚙️ 设置</button>
            </div>

            <!-- 结果 -->
            <div id="result" class="result-section" style="display: none;">
                <h3>生成结果</h3>
                <div id="resultContent"></div>
            </div>
        </div>

        <!-- 设置模态框 -->
        <div id="settingsModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header" id="modalHeader">
                    <h2>设置</h2>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="settings-sidebar">
                        <div class="settings-menu-item active" data-tab="general">
                            <span class="menu-icon">⚙️</span>
                            <span class="menu-text">通用</span>
                        </div>
                        <div class="settings-menu-item" data-tab="database">
                            <span class="menu-icon">🗄️</span>
                            <span class="menu-text">数据库</span>
                        </div>
                        <div class="settings-menu-item" data-tab="scripttype">
                            <span class="menu-icon">📝</span>
                            <span class="menu-text">脚本类型</span>
                        </div>
                        <div class="settings-menu-item" data-tab="about">
                            <span class="menu-icon">ℹ️</span>
                            <span class="menu-text">关于软件</span>
                        </div>
                    </div>
                    <div class="settings-content">
                        <!-- 通用配置 -->
                        <div id="tab-general" class="settings-tab active">
                            <div class="form-group">
                                <label>脚本位置</label>
                                <div class="path-input-group">
                                    <input type="text" id="basePath" class="input-field" placeholder="脚本存储根目录">
                                    <button id="browsePathBtn" class="btn-small">浏览</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>开发者中文名</label>
                                <input type="text" id="devChName" class="input-field" placeholder="用于脚本作者署名">
                            </div>
                            <div class="form-group">
                                <label>开发者英文名</label>
                                <input type="text" id="devEnName" class="input-field" placeholder="用于脚本历史记录标识">
                            </div>
                            <div class="form-group">
                                <label>文本编辑器</label>
                                <div class="path-input-group">
                                    <input type="text" id="textEditor" class="input-field" placeholder="编辑器可执行文件路径">
                                    <button id="browseEditorBtn" class="btn-small">浏览</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="autoUpdateCheckbox"> 有更新时自动更新
                                </label>
                                <div class="setting-hint">开启后，应用会自动下载并安装新版本</div>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="autoStartCheckbox"> 开机自动启动
                                </label>
                                <div class="setting-hint">开启后，系统启动时会自动运行本应用</div>
                            </div>
                            <div class="form-group">
                                <label>关闭行为</label>
                                <select id="closeActionSelect" class="select-field">
                                    <option value="ask">每次询问</option>
                                    <option value="hide">隐藏到托盘</option>
                                    <option value="quit">直接退出</option>
                                </select>
                                <div class="setting-hint">选择点击关闭按钮时的默认行为</div>
                            </div>
                        </div>

                        <!-- 数据库配置 -->
                        <div id="tab-database" class="settings-tab">
                            <div class="form-group">
                                <label>数据库</label>
                                <div id="databasesConfig" class="config-list"></div>
                                <button id="addDatabaseBtn" class="btn-small">+ 添加数据库</button>
                            </div>
                        </div>

                        <!-- 脚本类型配置 -->
                        <div id="tab-scripttype" class="settings-tab">
                            <div class="form-group">
                                <label>脚本类型</label>
                                <div id="scriptTypesConfig" class="config-list"></div>
                                <button id="addScriptTypeBtn" class="btn-small">+ 添加脚本类型</button>
                            </div>
                        </div>

                        <!-- 关于软件页面 -->
                        <div id="tab-about" class="settings-tab">
                            <div class="about-section">
                                <div class="about-icon">📝</div>
                                <div class="about-name">SQL Script Generator</div>
                                <div class="about-version" id="aboutVersion">版本: 1.0.0</div>
                                <div class="about-description">SQL脚本生成工具，用于快速生成符合规范的SQL脚本文件。</div>
                                <div class="about-author" id="aboutAuthor">作者: 加载中...</div>
                                <div class="about-copyright" id="aboutCopyright"></div>
                                <div class="about-buttons">
                                    <button id="checkUpdateBtn" class="btn btn-secondary">🔍 检查更新</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveSettingsBtn" class="btn btn-primary">保存</button>
                    <button id="cancelSettingsBtn" class="btn btn-secondary">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
